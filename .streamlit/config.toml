## 📋 Common Issues and Fixes

### Issue 1: "This branch does not exist"

**Fix:** Make sure you typed `main` (not `master`) in the Branch field

### Issue 2: "File not found: streamlit_app.py"

**Fix:** Verify `streamlit_app.py` is in the root of your repository (not in a subfolder)

### Issue 3: "Module not found"

**Fix:** Make sure `requirements.txt` was uploaded and contains:
```
streamlit>=1.28.0
pandas>=2.0.0
openpyxl>=3.1.0
