## 🌐 PART 5: Deploy to Streamlit Cloud

### Step 10: Sign Up for Streamlit Cloud

1. **Open a new tab**, go to: **https://share.streamlit.io**

2. **Click "Sign up"** or **"Continue with GitHub"**

3. **Authorize Streamlit:**
   - You'll see a GitHub authorization page
   - Click **"Authorize streamlit"** (green button)
   - May need to enter your GitHub password

4. **You're logged in!** You should see the Streamlit Cloud dashboard

### Step 11: Create New App

1. **Click "New app"** (big blue button)

2. **You'll see a deployment form**

### Step 12: Fill Out Deployment Form

**EXACTLY fill in these fields:**
```
Repository:
YOUR-USERNAME/corporate-forecast-engine
```
(Start typing and it should autocomplete)
```
Branch:
main
```
⚠️ **Make sure it's `main` not `master`!**
```
Main file path:
streamlit_app.py
```

**App URL (optional):**
```
Leave default or customize
Example: forecast-engine.streamlit.app
```

### Step 13: Deploy!

1. **Click "Deploy!"** (big blue button)

2. **You'll see the deployment screen** with logs:
```
   Preparing environment...
   Installing requirements...
   Running streamlit_app.py...
```

3. **Wait 2-5 minutes** - Don't close the tab!

4. **When you see:**
```
   ✅ Your app is running!
```

5. **Your app URL** will be shown at the top

